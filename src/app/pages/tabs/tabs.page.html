<ion-tabs>
  <ion-tab-bar slot="bottom">
    <!-- Tab 1 - List & Search -->
    <ion-tab-button tab="tab1" routerLink="/tab1" routerLinkActive="tab-selected">
      <ion-icon name="grid-outline"></ion-icon>
      <ion-label>List</ion-label>
    </ion-tab-button>

    <!-- Tab 2 - Add & Featured -->
    <ion-tab-button tab="tab2" routerLink="/tab2" routerLinkActive="tab-selected">
      <ion-icon name="add-outline"></ion-icon>
      <ion-label>Add</ion-label>
    </ion-tab-button>

    <!-- Tab 3 - Update & Delete -->
    <ion-tab-button tab="tab3" routerLink="/tab3" routerLinkActive="tab-selected">
      <ion-icon name="settings-outline"></ion-icon>
      <ion-label>Manage</ion-label>
    </ion-tab-button>

    <!-- Tab 4 - Privacy & Security -->
    <ion-tab-button tab="tab4" routerLink="/tab4" routerLinkActive="tab-selected">
      <ion-icon name="shield-outline"></ion-icon>
      <ion-label>Security</ion-label>
    </ion-tab-button>
  </ion-tab-bar>

  <ion-router-outlet></ion-router-outlet>
</ion-tabs>
