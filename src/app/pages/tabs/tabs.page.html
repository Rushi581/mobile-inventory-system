<ion-tabs [environmentInjector]="environmentInjector">
  <ion-tab-bar slot="bottom">
    <!-- Tab 1 - List & Search -->
    <ion-tab-button tab="tab1" href="/tab1">
      <ion-icon name="grid-outline"></ion-icon>
      <ion-label>List</ion-label>
    </ion-tab-button>

    <!-- Tab 2 - Add & Featured -->
    <ion-tab-button tab="tab2" href="/tab2">
      <ion-icon name="add-outline"></ion-icon>
      <ion-label>Add</ion-label>
    </ion-tab-button>

    <!-- Tab 3 - Update & Delete -->
    <ion-tab-button tab="tab3" href="/tab3">
      <ion-icon name="settings-outline"></ion-icon>
      <ion-label>Manage</ion-label>
    </ion-tab-button>

    <!-- Tab 4 - Dashboard -->
    <ion-tab-button tab="dashboard" href="/dashboard">
      <ion-icon name="stats-chart-outline"></ion-icon>
      <ion-label>Dashboard</ion-label>
    </ion-tab-button>

    <!-- Tab 5 - Privacy & Security -->
    <ion-tab-button tab="tab4" href="/tab4">
      <ion-icon name="shield-outline"></ion-icon>
      <ion-label>Security</ion-label>
    </ion-tab-button>
  </ion-tab-bar>
</ion-tabs>
